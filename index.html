<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Damz AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0D0A1E 0%, #130D2E 50%, #0D0A1E 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 2px; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-8px);opacity:1} }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
    .orb-1{top:-15%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,0.15) 0%,transparent 70%)}
    .orb-2{bottom:-15%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(79,70,229,0.12) 0%,transparent 70%)}
    .chat-container{width:100%;max-width:720px;height:90vh;display:flex;flex-direction:column;background:rgba(255,255,255,0.03);border-radius:24px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,0.5);overflow:hidden;position:relative;z-index:1}
    .header{padding:18px 24px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.2)}
    .header-left{display:flex;align-items:center;gap:14px}
    .avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 15px rgba(124,58,237,0.5)}
    .bot-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#fff}
    .bot-name span{color:#A78BFA}
    .status{display:flex;align-items:center;gap:6px;margin-top:2px}
    .status-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:pulse 2s ease infinite}
    .status-text{font-size:12px;color:rgba(255,255,255,0.5)}
    .clear-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.5);padding:8px 14px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:all 0.2s}
    .clear-btn:hover{color:#fff;background:rgba(255,255,255,0.12)}
    .messages{flex:1;overflow-y:auto;padding:24px 24px 8px}
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;animation:fadeSlideIn 0.5s ease}
    .welcome-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#7C3AED,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 8px 30px rgba(124,58,237,0.4)}
    .welcome-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:#fff;text-align:center;margin-bottom:6px}
    .welcome-sub{color:rgba(255,255,255,0.45);font-size:14px;line-height:1.6;text-align:center;max-width:360px}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
    .suggestion-btn{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.35);border-radius:20px;color:#C4B5FD;padding:8px 14px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;transition:all 0.2s}
    .suggestion-btn:hover{background:rgba(124,58,237,0.3)}
    .message-row{display:flex;margin-bottom:16px;animation:fadeSlideIn 0.3s ease}
    .message-row.user{justify-content:flex-end}
    .msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .msg-avatar.bot-av{background:linear-gradient(135deg,#7C3AED,#4F46E5);margin-right:10px;box-shadow:0 2px 8px rgba(124,58,237,0.35)}
    .msg-avatar.user-av{background:rgba(255,255,255,0.15);margin-left:10px}
    .bubble{max-width:72%;padding:12px 16px;font-size:14px;line-height:1.6;color:#fff;white-space:pre-wrap;word-break:break-word}
    .bubble.bot{border-radius:18px 18px 18px 4px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1)}
    .bubble.user{border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#7C3AED,#4F46E5)}
    .typing-row{display:flex;align-items:center;gap:10px;animation:fadeSlideIn 0.3s ease;margin-bottom:16px}
    .typing-bubble{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:18px 18px 18px 4px;padding:12px 16px;display:flex;gap:6px;align-items:center}
    .dot{width:8px;height:8px;border-radius:50%;background:#7C3AED}
    .dot:nth-child(1){animation:bounce 1.2s ease-in-out 0s infinite}
    .dot:nth-child(2){animation:bounce 1.2s ease-in-out 0.2s infinite}
    .dot:nth-child(3){animation:bounce 1.2s ease-in-out 0.4s infinite}
    .error-msg{text-align:center;color:#F87171;font-size:13px;padding:12px 16px;background:rgba(239,68,68,0.1);border-radius:12px;border:1px solid rgba(239,68,68,0.2);margin-top:8px}
    .input-area{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.07);background:rgba(0,0,0,0.2)}
    .input-box{display:flex;align-items:flex-end;gap:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:10px 14px;transition:border-color 0.2s}
    .input-box:focus-within{border-color:rgba(124,58,237,0.5)}
    #userInput{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:'Inter',sans-serif;line-height:1.6;resize:none;max-height:120px;overflow-y:auto}
    #userInput::placeholder{color:rgba(255,255,255,0.3)}
    .send-btn{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#4F46E5);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px rgba(124,58,237,0.4);flex-shrink:0}
    .send-btn:disabled{background:rgba(124,58,237,0.3);box-shadow:none;cursor:not-allowed}
    .input-hint{text-align:center;margin-top:10px;font-size:11px;color:rgba(255,255,255,0.2)}
    @media(max-width:480px){.chat-container{height:100vh;border-radius:0}body{padding:0}}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="chat-container">
    <div class="header">
      <div class="header-left">
        <div class="avatar">⚡</div>
        <div>
          <div class="bot-name">Damz <span>AI</span></div>
          <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Online & siap membantu</span>
          </div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat()">🗑 Bersihkan</button>
    </div>
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <div>
          <div class="welcome-title">Halo! Aku Damz AI 👋</div>
          <div class="welcome-sub">Tanyakan apa saja — pengetahuan umum, coding, ide kreatif, atau sekadar ngobrol santai!</div>
        </div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="useSuggestion('Siapa kamu?')">Siapa kamu?</button>
          <button class="suggestion-btn" onclick="useSuggestion('Ceritakan sesuatu yang menarik')">Ceritakan sesuatu yang menarik</button>
          <button class="suggestion-btn" onclick="useSuggestion('Bantu saya belajar Python')">Bantu saya belajar Python</button>
          <button class="suggestion-btn" onclick="useSuggestion('Beri ide konten kreator')">Beri ide konten kreator</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" rows="1" placeholder="Ketik pesanmu di sini..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">Tekan Enter untuk kirim · Shift+Enter untuk baris baru</div>
    </div>
  </div>
  <script>
    let chatHistory = [];
    let isLoading = false;
    function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px"}
    function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}}
    function useSuggestion(text){document.getElementById("userInput").value=text;autoResize(document.getElementById("userInput"));document.getElementById("userInput").focus()}
    function scrollToBottom(){const msgs=document.getElementById("messages");msgs.scrollTop=msgs.scrollHeight}
    function appendMessage(role,content){
      const welcome=document.getElementById("welcome");if(welcome)welcome.remove();
      const container=document.getElementById("messages");
      const row=document.createElement("div");row.className="message-row "+(role==="user"?"user":"bot");
      if(role==="assistant"){const av=document.createElement("div");av.className="msg-avatar bot-av";av.textContent="⚡";row.appendChild(av)}
      const bubble=document.createElement("div");bubble.className="bubble "+(role==="user"?"user":"bot");bubble.textContent=content;row.appendChild(bubble);
      if(role==="user"){const av=document.createElement("div");av.className="msg-avatar user-av";av.textContent="👤";row.appendChild(av)}
      container.appendChild(row);scrollToBottom()
    }
    function showTyping(){
      const welcome=document.getElementById("welcome");if(welcome)welcome.remove();
      const container=document.getElementById("messages");
      const row=document.createElement("div");row.className="typing-row";row.id="typingIndicator";
      const av=document.createElement("div");av.className="msg-avatar bot-av";av.textContent="⚡";row.appendChild(av);
      const bubble=document.createElement("div");bubble.className="typing-bubble";bubble.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';row.appendChild(bubble);
      container.appendChild(row);scrollToBottom()
    }
    function hideTyping(){const t=document.getElementById("typingIndicator");if(t)t.remove()}
    function showError(msg){
      const container=document.getElementById("messages");
      const div=document.createElement("div");div.className="error-msg";div.textContent=msg;
      container.appendChild(div);scrollToBottom();setTimeout(()=>div.remove(),6000)
    }
    function clearChat(){
      chatHistory=[];
      const container=document.getElementById("messages");container.innerHTML="";
      const welcome=document.createElement("div");welcome.className="welcome";welcome.id="welcome";
      welcome.innerHTML=`<div class="welcome-icon">⚡</div><div><div class="welcome-title">Halo! Aku Damz AI 👋</div><div class="welcome-sub">Tanyakan apa saja — pengetahuan umum, coding, ide kreatif, atau sekadar ngobrol santai!</div></div><div class="suggestions"><button class="suggestion-btn" onclick="useSuggestion('Siapa kamu?')">Siapa kamu?</button><button class="suggestion-btn" onclick="useSuggestion('Ceritakan sesuatu yang menarik')">Ceritakan sesuatu yang menarik</button><button class="suggestion-btn" onclick="useSuggestion('Bantu saya belajar Python')">Bantu saya belajar Python</button><button class="suggestion-btn" onclick="useSuggestion('Beri ide konten kreator')">Beri ide konten kreator</button></div>`;
      container.appendChild(welcome)
    }
    async function sendMessage(){
      if(isLoading)return;
      const input=document.getElementById("userInput");
      const text=input.value.trim();if(!text)return;
      isLoading=true;input.value="";input.style.height="auto";
      document.getElementById("sendBtn").disabled=true;
      chatHistory.push({role:"user",content:text});
      appendMessage("user",text);showTyping();
      try{
        const response=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:chatHistory})});
        const data=await response.json();
        if(data.error){hideTyping();showError("Error: "+(data.error.message||data.error));chatHistory.pop();return}
        const reply=data.content?.map(b=>b.text||"").join("")||"Maaf, tidak bisa merespons saat ini.";
        chatHistory.push({role:"assistant",content:reply});hideTyping();appendMessage("assistant",reply)
      }catch(err){hideTyping();showError("❌ Gagal terhubung. Coba lagi!");chatHistory.pop()}
      finally{isLoading=false;document.getElementById("sendBtn").disabled=false;input.focus()}
    }
  </script>
</body>
</html>
